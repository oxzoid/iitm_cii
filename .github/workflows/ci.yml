name: CI  # Name your workflow

on:
  push:  # Runs when you push code
    branches: [ main ]  # On main branch
  workflow_dispatch:  # Lets you manually trigger it (key for testing)[]

jobs:
  test:
    runs-on: ubuntu-latest  # Free Linux machine
    steps:
    - uses: actions/checkout@v4  # Grabs your code
    - run: echo "Tests passed!"  # Fake "test" that always succeeds
